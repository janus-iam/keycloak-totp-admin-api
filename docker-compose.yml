services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.5
    container_name: keycloak-totp-local
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./target/keycloak-totp-admin-api-1.0.1-SNAPSHOT.jar:/opt/keycloak/providers/keycloak-totp-admin-api-1.0.1-SNAPSHOT.jar:ro
    command:
      - start-dev
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/realms/master/.well-known/openid-configuration || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    develop:
      watch:
        - action : restart
          path: ./target/keycloak-totp-admin-api-1.0.1-SNAPSHOT.jar
